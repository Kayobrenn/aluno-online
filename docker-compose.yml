version: "3.8"

services:
  postgres:
    image: postgres:13.3
    container_name: postgres_alunoonline
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dw_alunoonline
    ports:
      - "5433:5432"
    volumes:
      - aluno_online_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "dw_alunoonline", "-U", "postgres"]
      interval: 10s
      timeout: 45s
      retries: 10

volumes:
  aluno_online_data: